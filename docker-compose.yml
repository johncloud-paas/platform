services:
  traefik:
    image: traefik:v2.11.6
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=letsencrypt
      - --entrypoints.websecure.http.tls.domains.main=$HOST
      - --entrypoints.websecure.http.tls.domains.sans=*.$HOST
      - --entrypoints.websecure.http.middlewares=waf-plugin@file
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.file.filename=conf.d/loadbalancer.yml
      - --api.dashboard=true
      - --api.insecure=true
      - --experimental.plugins.wafrisPlugin.moduleName=github.com/Wafris/wafris-traefik
      - --experimental.plugins.wafrisPlugin.version=v0.0.2
      - --certificatesresolvers.letsencrypt.acme.email=$ADMIN_EMAIL
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/conf.d
      - test_data:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.$HOST`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.entrypoints=websecure"
  
  redis:
    image: redis:7.2.0
    container_name: redis
    # depends_on:
    #   - dynatrace
    environment:
      - TZ=$TZ
      - ENABLE_OVERCOMMIT_MEMORY=true
    volumes:
      - redis_data:/data
    labels:
      - "traefik.enable=false"

volumes:
  test_data:
    name: test_data
  redis_data:
    name: redis_data

networks:
  default:
    external: true
    name: traefik-proxy
    